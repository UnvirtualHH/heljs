name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  verify-and-pack:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: npm ci

      - name: Release Check
        run: npm run release:check

      - name: Pack Artifact
        run: |
          mkdir -p artifacts
          npm run pack:artifact

      - name: Upload Package Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hel-package
          path: artifacts/*.tgz

  publish-npm:
    needs: verify-and-pack
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Download Package Artifact
        uses: actions/download-artifact@v4
        with:
          name: hel-package
          path: artifacts

      - name: Publish to npm
        run: npm publish artifacts/*.tgz --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
